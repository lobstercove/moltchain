[package]
name = "molt-cli"
version = "0.1.0"
edition = "2021"
authors = ["Trading Lobster <trading.lobster@moltchain.io>"]
description = "MoltChain command-line interface"

[[bin]]
name = "molt"
path = "src/main.rs"

[[bin]]
name = "marketplace-demo"
path = "src/marketplace_demo.rs"

[dependencies]
moltchain-core = { path = "../core" }
clap = { version = "4.5", features = ["derive"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tokio = { version = "1.35", features = ["full"] }
reqwest = { version = "0.11", features = ["json"] }
anyhow = "1.0"
dirs = "5.0"
base64 = "0.22.1"
bincode = "1.3"
hex = "0.4"
base58 = "0.2"
chrono = "0.4"
tracing = "0.1"
tracing-subscriber = "0.3"
wasm-encoder = "0.204"
sha2 = "0.10"
getrandom = "0.4.1"
aes-gcm = "0.10"
