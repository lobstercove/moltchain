version: "3.8"

services:
  validator:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: moltchain-validator
    restart: unless-stopped
    ports:
      - "8000:8000"   # P2P
      - "9000:9000"   # RPC
      - "9100:9100"   # Metrics
    volumes:
      - moltchain-data:/var/lib/moltchain
      - ./config.toml:/etc/moltchain/config.toml:ro
    environment:
      - RUST_LOG=info
      - MOLTCHAIN_DATA_DIR=/var/lib/moltchain
      - MOLTCHAIN_ADMIN_TOKEN=${MOLTCHAIN_ADMIN_TOKEN:-}
    networks:
      - moltchain
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9000/ -d '{\"jsonrpc\":\"2.0\",\"id\":1,\"method\":\"getHealth\"}' -H 'Content-Type: application/json' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  faucet:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: moltchain-faucet
    restart: unless-stopped
    entrypoint: ["moltchain-faucet"]
    ports:
      - "9001:9001"
    environment:
      - RUST_LOG=info
      - MOLTCHAIN_RPC_URL=http://validator:9000
    depends_on:
      validator:
        condition: service_healthy
    networks:
      - moltchain

  # Optional: explorer frontend (static)
  explorer:
    image: nginx:alpine
    container_name: moltchain-explorer
    restart: unless-stopped
    ports:
      - "3000:80"
    volumes:
      - ./explorer:/usr/share/nginx/html:ro
    depends_on:
      validator:
        condition: service_healthy
    networks:
      - moltchain

volumes:
  moltchain-data:
    driver: local

networks:
  moltchain:
    driver: bridge
