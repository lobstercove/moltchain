version: "3.8"

services:
  validator:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: moltchain-validator
    restart: unless-stopped
    ports:
      - "7001:7001"   # P2P
      - "8899:8899"   # RPC
      - "8900:8900"   # WebSocket
      - "9100:9100"   # Metrics
    volumes:
      - moltchain-data:/var/lib/moltchain
      - ./config.toml:/etc/moltchain/config.toml:ro
    environment:
      - RUST_LOG=info
      - MOLTCHAIN_DATA_DIR=/var/lib/moltchain
      - MOLTCHAIN_ADMIN_TOKEN=${MOLTCHAIN_ADMIN_TOKEN:-}
    networks:
      - moltchain
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8899/ -d '{\"jsonrpc\":\"2.0\",\"id\":1,\"method\":\"getHealth\"}' -H 'Content-Type: application/json' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  faucet:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: moltchain-faucet
    restart: unless-stopped
    entrypoint: ["moltchain-faucet"]
    ports:
      - "9101:9101"
    environment:
      - RUST_LOG=info
      - PORT=9101
      - RPC_URL=http://validator:8899
      - FAUCET_KEYPAIR=/app/data/faucet-keypair.json
      - AIRDROPS_FILE=/app/data/airdrops.json
    volumes:
      - faucet-data:/app/data
    depends_on:
      validator:
        condition: service_healthy
    networks:
      - moltchain

  # Optional: explorer frontend (static)
  explorer:
    image: nginx:alpine
    container_name: moltchain-explorer
    restart: unless-stopped
    ports:
      - "3000:80"
    volumes:
      - ./explorer:/usr/share/nginx/html:ro
    depends_on:
      validator:
        condition: service_healthy
    networks:
      - moltchain

volumes:
  moltchain-data:
    driver: local
  faucet-data:
    driver: local

networks:
  moltchain:
    driver: bridge
