version: "3.8"

services:
  validator:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lichen-validator
    restart: unless-stopped
    ports:
      - "7001:7001"   # P2P
      - "8899:8899"   # RPC
      - "8900:8900"   # WebSocket
      - "9100:9100"   # Metrics
    volumes:
      - lichen-data:/var/lib/lichen
      - ./config.toml:/etc/lichen/config.toml:ro
    environment:
      - RUST_LOG=info
      - LICHEN_DATA_DIR=/var/lib/lichen
      - LICHEN_ADMIN_TOKEN=${LICHEN_ADMIN_TOKEN:-}
    networks:
      - lichen
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8899/ -d '{\"jsonrpc\":\"2.0\",\"id\":1,\"method\":\"getHealth\"}' -H 'Content-Type: application/json' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  faucet:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lichen-faucet
    restart: unless-stopped
    entrypoint: ["lichen-faucet"]
    ports:
      - "9101:9101"
    environment:
      - RUST_LOG=info
      - PORT=9101
      - RPC_URL=http://validator:8899
      - FAUCET_KEYPAIR=/app/data/faucet-keypair.json
      - AIRDROPS_FILE=/app/data/airdrops.json
    volumes:
      - faucet-data:/app/data
    depends_on:
      validator:
        condition: service_healthy
    networks:
      - lichen

  # Optional: explorer frontend (static)
  explorer:
    image: nginx:alpine
    container_name: lichen-explorer
    restart: unless-stopped
    ports:
      - "3000:80"
    volumes:
      - ./explorer:/usr/share/nginx/html:ro
    depends_on:
      validator:
        condition: service_healthy
    networks:
      - lichen

volumes:
  lichen-data:
    driver: local
  faucet-data:
    driver: local

networks:
  lichen:
    driver: bridge
