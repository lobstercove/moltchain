name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  expected-contracts:
    name: Expected Contract Lockfile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify expected contracts lockfile
        run: python3 tests/update-expected-contracts.py --check

  prediction-market-tests:
    name: Prediction Market Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run prediction_market tests
        run: cd contracts/prediction_market && cargo test --release

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run workspace tests
        run: cargo test --workspace
      - name: Run standalone contract tests
        run: |
          FAIL=0
          for dir in contracts/*/; do
            if [ -f "$dir/Cargo.toml" ]; then
              name=$(basename "$dir")
              echo "Testing $name..."
              if ! (cd "$dir" && cargo test 2>&1); then
                echo "❌ FAILED: $name"
                FAIL=1
              fi
            fi
          done
          if [ $FAIL -ne 0 ]; then echo "❌ Contract tests failed"; exit 1; fi

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Clippy
        run: cargo clippy --workspace -- -D warnings

  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Check formatting
        run: cargo fmt --all -- --check

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build validator
        run: cargo build --release --bin moltchain-validator
      - name: Start validator in background
        run: |
          ./target/release/moltchain-validator &
          sleep 5  # wait for startup
      - name: Run RPC integration tests
        run: bash tests/test-rpc-comprehensive.sh
      - name: Run CLI integration tests
        run: bash tests/test-cli-comprehensive.sh

  wasm-contracts:
    name: WASM Contract Builds
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
        with:
          cache-directories: target/wasm32-unknown-unknown
      - name: Build all contracts to WASM
        run: |
          FAIL=0
          for dir in contracts/*/; do
            if [ -f "$dir/Cargo.toml" ]; then
              name=$(basename "$dir")
              echo "Building $name..."
              if ! (cd "$dir" && cargo build --target wasm32-unknown-unknown --release 2>&1); then
                echo "❌ FAILED: $name"
                FAIL=1
              fi
            fi
          done
          if [ $FAIL -ne 0 ]; then echo "❌ WASM build failed"; exit 1; fi

  build-docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t moltchain-validator .
