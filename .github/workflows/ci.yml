name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  cargo-audit:
    name: Cargo Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      - name: Audit all Cargo.lock files
        run: |
          set -euo pipefail
          while IFS= read -r lockfile; do
            echo "Auditing ${lockfile}"
            cargo audit -q -D warnings --file "$lockfile"
          done < <(find . -path '*/target' -prune -o -name Cargo.lock -print | sort)

  cargo-deny:
    name: Cargo Deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-deny
        run: cargo install cargo-deny --locked
      - name: Run cargo-deny
        run: cargo deny check --config deny.toml advisories licenses sources

  expected-contracts:
    name: Expected Contract Lockfile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify expected contracts lockfile
        run: bash scripts/run-local-private-check.sh tests/update-expected-contracts.py -- python3 tests/update-expected-contracts.py --check

  prediction-market-tests:
    name: Prediction Market Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run prediction_market tests
        run: cd contracts/prediction_market && cargo test --release

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run workspace tests
        run: cargo test --workspace
      - name: Run standalone contract tests
        run: |
          FAIL=0
          for dir in contracts/*/; do
            if [ -f "$dir/Cargo.toml" ]; then
              name=$(basename "$dir")
              echo "Testing $name..."
              if ! (cd "$dir" && cargo test 2>&1); then
                echo "❌ FAILED: $name"
                FAIL=1
              fi
            fi
          done
          if [ $FAIL -ne 0 ]; then echo "❌ Contract tests failed"; exit 1; fi
      - name: Run local helper guard checks
        run: bash scripts/run-local-private-check.sh tests/test_local_helper_guards.sh -- bash tests/test_local_helper_guards.sh

  rust-sbom:
    name: Rust SBOM
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-cyclonedx
        run: cargo install cargo-cyclonedx --locked
      - name: Generate workspace Rust SBOM
        run: cargo cyclonedx --manifest-path Cargo.toml --all-features --format json --override-filename lichen-rust-sbom
      - name: Upload Rust SBOM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: lichen-rust-sbom
          path: |
            ./lichen-rust-sbom.json
            ./**/lichen-rust-sbom.json
          if-no-files-found: error

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Clippy
        run: cargo clippy --workspace -- -D warnings

  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Check formatting
        run: cargo fmt --all -- --check

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build validator
        run: cargo build --release --bin lichen-validator
      - name: Install Node.js dependencies
        run: npm install
      - name: Start validator in background
        run: |
          ./target/release/lichen-validator &
          echo "Waiting for RPC to become ready (ZK setup may take ~30s)..."
          for i in $(seq 1 60); do
            if curl -sf http://localhost:8899 -d '{"jsonrpc":"2.0","id":1,"method":"getHealth"}' -H 'Content-Type: application/json' >/dev/null 2>&1; then
              echo "RPC ready after ${i}s"
              break
            fi
            sleep 1
          done
      - name: Run RPC integration tests
        run: bash scripts/run-local-private-check.sh tests/test-rpc-comprehensive.sh -- bash tests/test-rpc-comprehensive.sh
      - name: Run CLI integration tests
        run: bash scripts/run-local-private-check.sh tests/test-cli-comprehensive.sh -- bash tests/test-cli-comprehensive.sh

  wasm-contracts:
    name: WASM Contract Builds
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
        with:
          cache-directories: target/wasm32-unknown-unknown
      - name: Build all contracts to WASM
        run: |
          FAIL=0
          for dir in contracts/*/; do
            if [ -f "$dir/Cargo.toml" ]; then
              name=$(basename "$dir")
              echo "Building $name..."
              if ! (cd "$dir" && cargo build --target wasm32-unknown-unknown --release 2>&1); then
                echo "❌ FAILED: $name"
                FAIL=1
              fi
            fi
          done
          if [ $FAIL -ne 0 ]; then echo "❌ WASM build failed"; exit 1; fi

  wallet-extension:
    name: Wallet Extension
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Build JS SDK
        run: cd sdk/js && npm install && npm run build
      - name: Run wallet audits
        run: |
          bash scripts/run-local-private-check.sh tests/test_wallet_extension_audit.js -- node tests/test_wallet_extension_audit.js
          bash scripts/run-local-private-check.sh tests/test_wallet_audit.js -- node tests/test_wallet_audit.js
      - name: Package wallet extension
        run: node scripts/package-wallet-extension.mjs
      - name: Upload wallet extension artifacts
        uses: actions/upload-artifact@v4
        with:
          name: lichen-wallet-extension-package
          path: dist/wallet-extension/*
          if-no-files-found: error

  build-docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: lichen-validator:latest
          cache-from: type=gha
          cache-to: type=gha,mode=min
