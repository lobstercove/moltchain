name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: moltchain-validator-linux-x86_64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact: moltchain-validator-linux-aarch64
          - os: macos-14
            target: x86_64-apple-darwin
            artifact: moltchain-validator-darwin-x86_64
          - os: macos-14
            target: aarch64-apple-darwin
            artifact: moltchain-validator-darwin-aarch64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: moltchain-validator-windows-x86_64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (Linux aarch64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      - name: Use system linker (Linux x86_64)
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        run: |
          mkdir -p .cargo
          printf '[target.x86_64-unknown-linux-gnu]\nrustflags = ["-C", "link-arg=-fuse-ld=/usr/bin/ld"]\n' >> .cargo/config.toml

      - name: Set macOS deployment target (darwin x86_64 cross-compile)
        if: matrix.target == 'x86_64-apple-darwin'
        run: echo "MACOSX_DEPLOYMENT_TARGET=14.0" >> $GITHUB_ENV

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }} --bin moltchain-validator

      - name: Strip binary (Linux)
        if: startsWith(matrix.os, 'ubuntu') && matrix.target != 'aarch64-unknown-linux-gnu'
        run: strip target/${{ matrix.target }}/release/moltchain-validator

      - name: Strip binary (Linux aarch64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: aarch64-linux-gnu-strip target/${{ matrix.target }}/release/moltchain-validator

      - name: Strip binary (macOS)
        if: startsWith(matrix.os, 'macos')
        run: strip target/${{ matrix.target }}/release/moltchain-validator

      - name: Create archive
        if: matrix.os != 'windows-latest'
        run: |
          mkdir -p ${{ matrix.artifact }}
          cp target/${{ matrix.target }}/release/moltchain-validator ${{ matrix.artifact }}/
          tar czf ${{ matrix.artifact }}.tar.gz ${{ matrix.artifact }}

      - name: Create archive (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path ${{ matrix.artifact }} | Out-Null
          Copy-Item target/${{ matrix.target }}/release/moltchain-validator.exe ${{ matrix.artifact }}/
          tar -czf ${{ matrix.artifact }}.tar.gz ${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.tar.gz

  checksums:
    name: Generate SHA256SUMS
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Generate SHA256SUMS
        run: |
          sha256sum moltchain-validator-*.tar.gz > SHA256SUMS
          cat SHA256SUMS

      - name: Upload SHA256SUMS
        uses: actions/upload-artifact@v4
        with:
          name: SHA256SUMS
          path: SHA256SUMS

  release:
    name: Create GitHub Release
    needs: checksums
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: List files
        run: ls -la

      - name: Create Release (Draft)
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: |
            moltchain-validator-linux-x86_64.tar.gz
            moltchain-validator-linux-aarch64.tar.gz
            moltchain-validator-darwin-x86_64.tar.gz
            moltchain-validator-darwin-aarch64.tar.gz
            moltchain-validator-windows-x86_64.tar.gz
            SHA256SUMS
          body: |
            ## MoltChain Validator ${{ github.ref_name }}

            ### Installation

            Download the archive for your platform, verify the checksum, and extract:

            ```bash
            # Download
            curl -LO https://github.com/lobstercove/moltchain/releases/download/${{ github.ref_name }}/moltchain-validator-linux-x86_64.tar.gz

            # Verify checksum
            curl -LO https://github.com/lobstercove/moltchain/releases/download/${{ github.ref_name }}/SHA256SUMS
            sha256sum -c SHA256SUMS --ignore-missing

            # Extract
            tar xzf moltchain-validator-linux-x86_64.tar.gz --strip-components=1
            chmod +x moltchain-validator
            ```

            Windows artifact:

            ```powershell
            Invoke-WebRequest -Uri https://github.com/lobstercove/moltchain/releases/download/${{ github.ref_name }}/moltchain-validator-windows-x86_64.tar.gz -OutFile moltchain-validator-windows-x86_64.tar.gz
            tar -xzf .\moltchain-validator-windows-x86_64.tar.gz --strip-components=1
            .\moltchain-validator.exe --version
            ```

            ### Auto-Update

            Existing validators with `--auto-update=apply` will automatically update.

            ### Signature Verification

            After signing (maintainer step):
            ```bash
            # Download signature
            curl -LO https://github.com/lobstercove/moltchain/releases/download/${{ github.ref_name }}/SHA256SUMS.sig
            ```

            > **Note:** This release is created as a DRAFT. A maintainer must:
            > 1. Download SHA256SUMS from the draft release
            > 2. Sign it offline: `./scripts/sign-release.sh SHA256SUMS release-signing-keypair.json`
            > 3. Upload SHA256SUMS.sig to the release
            > 4. Publish the release
