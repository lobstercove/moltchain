<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MoltWallet — Settings</title>
  <link rel="stylesheet" href="../styles/shared-base-styles.css" />
  <link rel="stylesheet" href="../styles/shared-theme.css" />
  <link rel="stylesheet" href="../styles/wallet.css" />
  <link rel="stylesheet" href="../styles/extension-overrides.css" />
  <link rel="stylesheet" href="settings.css" />
</head>
<body class="wallet-body">
  <main class="settings-shell container">
    <section class="wallet-content">
      <div class="settings-top">
        <h2>Settings</h2>
        <button id="refreshSettings" class="btn btn-secondary btn-small">Refresh</button>
      </div>
      <div id="settingsMeta" class="meta"></div>

      <div class="settings-grid">
        <section class="settings-card">
          <h3>Wallet Management</h3>
          <div class="form-group">
            <label>Active Wallet</label>
            <select id="settingsWalletSelector" class="form-input"></select>
          </div>
          <div class="settings-actions-inline">
            <button id="renameWalletBtn" class="btn btn-secondary btn-small">Rename</button>
            <button id="removeWalletBtn" class="btn btn-secondary btn-small">Remove</button>
            <button id="lockNowBtn" class="btn btn-secondary btn-small">Lock Now</button>
          </div>
        </section>

        <section class="settings-card">
          <h3>Network</h3>
          <div class="form-group">
            <label>Selected Network</label>
            <select id="settingsNetwork" class="form-input">
              <option value="mainnet">Mainnet</option>
              <option value="testnet">Testnet</option>
              <option value="local-testnet">Local Testnet</option>
              <option value="local-mainnet">Local Mainnet</option>
            </select>
          </div>
          <div class="form-group">
            <label>Mainnet RPC</label>
            <input id="settingsMainnetRpc" class="form-input" placeholder="https://rpc.moltchain.network" />
          </div>
          <div class="form-group">
            <label>Testnet RPC</label>
            <input id="settingsTestnetRpc" class="form-input" placeholder="https://testnet-rpc.moltchain.network" />
          </div>
          <div class="form-group">
            <label>Local Testnet RPC</label>
            <input id="settingsLocalTestnetRpc" class="form-input" placeholder="http://localhost:8899" />
          </div>
          <div class="form-group">
            <label>Local Mainnet RPC</label>
            <input id="settingsLocalMainnetRpc" class="form-input" placeholder="http://localhost:9899" />
          </div>
          <div class="form-group">
            <label>Mainnet Custody</label>
            <input id="settingsMainnetCustody" class="form-input" placeholder="https://custody.moltchain.network" />
          </div>
          <div class="form-group">
            <label>Testnet Custody</label>
            <input id="settingsTestnetCustody" class="form-input" placeholder="https://testnet-custody.moltchain.network" />
          </div>
          <div class="form-group">
            <label>Local Custody</label>
            <input id="settingsLocalCustody" class="form-input" placeholder="http://localhost:9105" />
          </div>
          <button id="saveNetworkBtn" class="btn btn-secondary btn-small">Save Network Settings</button>
        </section>

        <section class="settings-card">
          <h3>Display & Security</h3>
          <div class="form-group">
            <label>Currency</label>
            <select id="settingsCurrency" class="form-input">
              <option value="USD">USD</option>
              <option value="EUR">EUR</option>
              <option value="GBP">GBP</option>
              <option value="JPY">JPY</option>
            </select>
          </div>
          <div class="form-group">
            <label>Decimals</label>
            <select id="settingsDecimals" class="form-input">
              <option value="2">2</option>
              <option value="4">4</option>
              <option value="6">6</option>
              <option value="8">8</option>
            </select>
          </div>
          <div class="form-group">
            <label>Auto-lock timeout</label>
            <select id="settingsLockTimeout" class="form-input">
              <option value="0">Never</option>
              <option value="1">1 minute</option>
              <option value="5">5 minutes</option>
              <option value="15">15 minutes</option>
              <option value="30">30 minutes</option>
              <option value="60">60 minutes</option>
            </select>
          </div>
          <button id="saveDisplaySecurityBtn" class="btn btn-secondary btn-small">Save Display & Security</button>
        </section>

        <section class="settings-card">
          <h3>Password & Export</h3>
          <div class="form-group">
            <label>Current Password</label>
            <input id="settingsCurrentPassword" type="password" class="form-input" placeholder="Current password" />
          </div>
          <div class="form-group">
            <label>New Password</label>
            <input id="settingsNewPassword" type="password" class="form-input" placeholder="New password" />
          </div>
          <div class="form-group">
            <label>Confirm New Password</label>
            <input id="settingsNewPasswordConfirm" type="password" class="form-input" placeholder="Confirm new password" />
          </div>
          <button id="changePasswordBtn" class="btn btn-secondary btn-small">Change Password</button>

          <div class="form-group" style="margin-top: 0.75rem;">
            <label>Password (for exports)</label>
            <input id="settingsExportPassword" type="password" class="form-input" placeholder="Wallet password" />
          </div>
          <div class="settings-actions-inline">
            <button id="exportPrivateKeyBtn" class="btn btn-secondary btn-small">Private Key</button>
            <button id="exportMnemonicBtn" class="btn btn-secondary btn-small">Seed Phrase</button>
            <button id="exportKeystoreBtn" class="btn btn-secondary btn-small">JSON Keystore</button>
            <button id="downloadPrivateKeyBtn" class="btn btn-secondary btn-small">Download Key</button>
            <button id="downloadMnemonicBtn" class="btn btn-secondary btn-small">Download Seed</button>
          </div>
          <div class="form-group" style="margin-top: 0.7rem;">
            <label>Export Output</label>
            <textarea id="settingsExportOutput" class="form-textarea" rows="4" readonly></textarea>
          </div>
          <button id="copyExportOutputBtn" class="btn btn-secondary btn-small">Copy Output</button>
        </section>

        <section class="settings-card">
          <h3>dApp Permissions</h3>
          <div id="approvedOriginsList" class="settings-origin-list">Loading approved origins...</div>
          <button id="refreshOriginsBtn" class="btn btn-secondary btn-small" style="margin-top:0.6rem;">Refresh Origins</button>
        </section>
      </div>

      <div id="settingsStatus" class="meta" style="margin-top: 0.85rem;">Ready</div>
      <div class="settings-footer">
        <button id="backHome" class="btn btn-secondary">Back to Dashboard</button>
      </div>
    </section>
  </main>

  <script src="../../shared/utils.js"></script>
  <script type="module" src="settings.js"></script>
</body>
</html>
