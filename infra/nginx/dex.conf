# ═══════════════════════════════════════════════════════════════════════════════
# Nginx Reverse Proxy — MoltyDEX
# ═══════════════════════════════════════════════════════════════════════════════

upstream moltchain_rpc {
    server moltchain:8899;
    keepalive 32;
}

upstream moltchain_ws {
    server moltchain:8900;
    keepalive 32;
}

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=api_read:10m rate=100r/s;
limit_req_zone $binary_remote_addr zone=api_write:10m rate=20r/s;
limit_conn_zone $binary_remote_addr zone=ws_conn:10m;

server {
    listen 80;
    server_name _;

    # Redirect to HTTPS in production
    return 301 https://$host$request_uri;

    # ─── JSON-RPC endpoint ───
    location / {
        limit_req zone=api_write burst=10 nodelay;

        proxy_pass http://moltchain_rpc;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # P9-INF-06: CORS restricted to known frontend origins
        add_header Access-Control-Allow-Origin "$http_origin" always;
        add_header Access-Control-Allow-Methods "GET, POST, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;

        if ($request_method = OPTIONS) {
            return 204;
        }
    }

    # ─── DEX REST API ───
    location /api/v1/ {
        # GET = read, POST/DELETE = write
        limit_req zone=api_read burst=50 nodelay;

        proxy_pass http://moltchain_rpc;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        add_header Access-Control-Allow-Origin "$http_origin" always;
        add_header Access-Control-Allow-Methods "GET, POST, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;

        if ($request_method = OPTIONS) {
            return 204;
        }
    }

    # ─── WebSocket ───
    location /ws {
        limit_conn ws_conn 100;

        proxy_pass http://moltchain_ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;

        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }

    # ─── Static files (DEX frontend) ───
    location /dex/ {
        alias /var/www/dex/;
        try_files $uri $uri/ /dex/index.html;

        expires 1h;
        add_header Cache-Control "public, no-transform";
    }

    # ─── Wallet ───
    location /wallet/ {
        alias /var/www/wallet/;
        try_files $uri $uri/ /wallet/index.html;
    }

    # ─── Explorer ───
    location /explorer/ {
        alias /var/www/explorer/;
        try_files $uri $uri/ /explorer/index.html;
    }

    # ─── Health check ───
    location /health {
        access_log off;
        proxy_pass http://moltchain_rpc;
    }

    # ─── Metrics (internal only) ───
    location /metrics {
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        deny all;

        proxy_pass http://moltchain_rpc:9100/metrics;
    }
}

# HTTPS server
server {
    listen 443 ssl http2;
    server_name dex.moltchain.io;

    ssl_certificate /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # HSTS (1 year)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ─── JSON-RPC endpoint ───
    location / {
        limit_req zone=api_write burst=10 nodelay;

        proxy_pass http://moltchain_rpc;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        add_header Access-Control-Allow-Origin "$http_origin" always;
        add_header Access-Control-Allow-Methods "GET, POST, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;

        if ($request_method = OPTIONS) {
            return 204;
        }
    }

    # ─── DEX REST API ───
    location /api/v1/ {
        limit_req zone=api_read burst=50;

        proxy_pass http://moltchain_rpc;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        add_header Access-Control-Allow-Origin "$http_origin" always;
        add_header Access-Control-Allow-Methods "GET, POST, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;

        if ($request_method = OPTIONS) {
            return 204;
        }
    }

    # ─── WebSocket (wss://) ───
    location /ws {
        limit_conn ws_conn 100;

        proxy_pass http://moltchain_ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;

        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }

    # ─── Static files (DEX frontend) ───
    location /dex/ {
        alias /var/www/dex/;
        try_files $uri $uri/ /dex/index.html;

        expires 1h;
        add_header Cache-Control "public, no-transform";
    }

    # ─── Wallet ───
    location /wallet/ {
        alias /var/www/wallet/;
        try_files $uri $uri/ /wallet/index.html;
    }

    # ─── Explorer ───
    location /explorer/ {
        alias /var/www/explorer/;
        try_files $uri $uri/ /explorer/index.html;
    }

    # ─── Health check ───
    location /health {
        access_log off;
        proxy_pass http://moltchain_rpc;
    }

    # ─── Metrics (internal only) ───
    location /metrics {
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        deny all;

        proxy_pass http://moltchain_rpc:9100/metrics;
    }
}
