# ═══════════════════════════════════════════════════════════════════════════════
# Alertmanager Configuration — Lichen
# ═══════════════════════════════════════════════════════════════════════════════
#
# Configure notification channels below before deploying to production.
# Supported receivers: email, slack, pagerduty, webhook, opsgenie, etc.
#
# Documentation: https://prometheus.io/docs/alerting/latest/configuration/
# ═══════════════════════════════════════════════════════════════════════════════

global:
  resolve_timeout: 5m

# ─── Routing tree ───
route:
  group_by: ['alertname', 'severity']
  group_wait: 10s
  group_interval: 5m
  repeat_interval: 4h
  receiver: 'default'

  routes:
    # Critical alerts: short repeat interval, dedicated channel
    - match:
        severity: critical
      receiver: 'critical'
      group_wait: 5s
      repeat_interval: 1h

    # Warning alerts: longer repeat interval
    - match:
        severity: warning
      receiver: 'default'
      repeat_interval: 4h

# ─── Inhibition rules ───
# Suppress warning-level alerts when a critical alert is already firing
inhibit_rules:
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname']

# ─── Receivers ───
# PRODUCTION: Replace these with real notification endpoints before mainnet launch.
#
# Example Slack config:
#   - name: 'critical'
#     slack_configs:
#       - api_url: 'https://hooks.slack.com/services/YOUR/WEBHOOK/URL'
#         channel: '#lichen-alerts-critical'
#         title: '{{ .GroupLabels.alertname }}'
#         text: '{{ range .Alerts }}{{ .Annotations.summary }}\n{{ end }}'
#
# Example webhook config (for custom integrations):
#   - name: 'critical'
#     webhook_configs:
#       - url: 'https://your-alert-handler.example.com/webhook'
#
# Example email config:
#   global:
#     smtp_smarthost: 'smtp.example.com:587'
#     smtp_from: 'alerts@lichen.network'
#   receivers:
#     - name: 'critical'
#       email_configs:
#         - to: 'oncall@lichen.network'

receivers:
  - name: 'default'
    # Webhook receiver — configure URL via ALERTMANAGER_WEBHOOK_URL env var.
    # The Docker entrypoint must run envsubst on this file before starting.
    # Example: envsubst < alertmanager.yml.tpl > alertmanager.yml
    webhook_configs:
      - url: 'http://localhost:9093/api/v1/alerts'
        send_resolved: true

  - name: 'critical'
    # Critical alerts — configure with high-priority notification channel.
    # The Docker entrypoint must run envsubst on this file before starting.
    webhook_configs:
      - url: 'http://localhost:9093/api/v1/alerts'
        send_resolved: true
