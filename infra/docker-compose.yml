# ═══════════════════════════════════════════════════════════════════════════════
# MoltyDEX Infrastructure — Docker Compose
# ═══════════════════════════════════════════════════════════════════════════════
version: "3.8"

services:
  # ─── MoltChain Node + RPC Server ───
  moltchain:
    build:
      context: ..
      dockerfile: infra/Dockerfile.moltchain
    ports:
      - "8899:8899"    # JSON-RPC + REST API
      - "8900:8900"    # WebSocket
      - "9100:9100"    # Metrics (Prometheus)
    volumes:
      - chain-data:/data/state
      - ./config:/config:ro
    environment:
      - RUST_LOG=info
      - MOLTCHAIN_DATA_DIR=/data/state
      - MOLTCHAIN_RPC_PORT=8899
      - MOLTCHAIN_WS_PORT=8900
      - MOLTCHAIN_METRICS_PORT=9100
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8899/", "-X", "POST", "-H", "Content-Type: application/json", "-d", '{"jsonrpc":"2.0","id":1,"method":"health"}']
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - moltchain

  # ─── Custody Bridge ───
  custody:
    build:
      context: ..
      dockerfile: infra/Dockerfile.custody
    environment:
      - RUST_LOG=info
      - CUSTODY_RPC_URL=http://moltchain:8000
      - CUSTODY_JUPITER_API_URL=${CUSTODY_JUPITER_API_URL:-}
      - CUSTODY_UNISWAP_ROUTER=${CUSTODY_UNISWAP_ROUTER:-}
      - CUSTODY_SOLANA_RPC=${CUSTODY_SOLANA_RPC:-https://api.devnet.solana.com}
      - CUSTODY_ETH_RPC=${CUSTODY_ETH_RPC:-}
    depends_on:
      moltchain:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - moltchain

  # ─── Market Maker Bot ───
  market-maker:
    build:
      context: ../dex/market-maker
      dockerfile: ../../infra/Dockerfile.market-maker
    environment:
      - DEX_ENDPOINT=http://moltchain:8000
      - DEX_WS_ENDPOINT=ws://moltchain:8001/ws
      - MM_PAIR_ID=0
      - MM_STRATEGY=spread
      - MM_HALF_SPREAD_BPS=15
      - MM_DRY_RUN=${MM_DRY_RUN:-false}
    depends_on:
      moltchain:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - moltchain

  # ─── Nginx Reverse Proxy ───
  nginx:
    image: nginx:1.25-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/dex.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - moltchain
    restart: unless-stopped
    networks:
      - moltchain

  # ─── Prometheus ───
  prometheus:
    image: prom/prometheus:v2.48.0
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=30d'
    restart: unless-stopped
    networks:
      - moltchain

  # ─── Grafana ───
  grafana:
    image: grafana/grafana:10.2.2
    ports:
      - "3000:3000"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-moltchain}
      - GF_USERS_ALLOW_SIGN_UP=false
    restart: unless-stopped
    networks:
      - moltchain

volumes:
  chain-data:
  prometheus-data:
  grafana-data:

networks:
  moltchain:
    driver: bridge
