# ═══════════════════════════════════════════════════════════════════════════════
# Lichen DEX Infrastructure — Docker Compose
# ═══════════════════════════════════════════════════════════════════════════════
version: "3.8"

services:
  # ─── Lichen Node + RPC Server ───
  lichen:
    build:
      context: ..
      dockerfile: infra/Dockerfile.lichen
    ports:
      - "8899:8899"    # JSON-RPC + REST API
      - "8900:8900"    # WebSocket
      - "9100:9100"    # Metrics (Prometheus)
    volumes:
      - chain-data:/data/state
      - ./config:/config:ro
    environment:
      - RUST_LOG=info
      - LICHEN_DATA_DIR=/data/state
      - LICHEN_RPC_PORT=8899
      - LICHEN_WS_PORT=8900
      - LICHEN_METRICS_PORT=9100
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8899/", "-X", "POST", "-H", "Content-Type: application/json", "-d", '{"jsonrpc":"2.0","id":1,"method":"health"}']
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - lichen

  # ─── Custody Bridge ───
  custody:
    build:
      context: ..
      dockerfile: infra/Dockerfile.custody
    environment:
      - RUST_LOG=info
      - CUSTODY_RPC_URL=http://lichen:8899
      - CUSTODY_JUPITER_API_URL=${CUSTODY_JUPITER_API_URL:-}
      - CUSTODY_UNISWAP_ROUTER=${CUSTODY_UNISWAP_ROUTER:-}
      - CUSTODY_SOLANA_RPC=${CUSTODY_SOLANA_RPC:-https://api.devnet.solana.com}
      - CUSTODY_ETH_RPC=${CUSTODY_ETH_RPC:-}
    depends_on:
      lichen:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f custody-bridge || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - lichen

  # ─── Market Maker Bot ───
  market-maker:
    build:
      context: ../dex/market-maker
      dockerfile: ../../infra/Dockerfile.market-maker
    environment:
      - DEX_ENDPOINT=http://lichen:8899
      - DEX_WS_ENDPOINT=ws://lichen:8900/ws
      - MM_PAIR_ID=0
      - MM_STRATEGY=spread
      - MM_HALF_SPREAD_BPS=15
      - MM_DRY_RUN=${MM_DRY_RUN:-false}
    depends_on:
      lichen:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f ts-node || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - lichen

  # ─── Nginx Reverse Proxy ───
  nginx:
    image: nginx:1.25-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/dex.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - lichen
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:80/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    networks:
      - lichen

  # ─── Prometheus ───
  prometheus:
    image: prom/prometheus:v2.48.0
    ports:
      # K-4: Bind to localhost only — Grafana scrapes via Docker network
      - "127.0.0.1:9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=30d'
    depends_on:
      - alertmanager
    restart: unless-stopped
    networks:
      - lichen

  # ─── Alertmanager ───
  alertmanager:
    image: prom/alertmanager:v0.26.0
    ports:
      # K-4: Bind to localhost only — prevents external alert silencing
      - "127.0.0.1:9093:9093"
    volumes:
      - ./alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9093/-/healthy || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    networks:
      - lichen

  # ─── Grafana ───
  grafana:
    image: grafana/grafana:10.2.2
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    environment:
      # P9-INF-02: No default fallback — GRAFANA_PASSWORD env var is required.
      # Set it in .env or export before running: export GRAFANA_PASSWORD=$(openssl rand -base64 24)
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:?GRAFANA_PASSWORD env var is required - set a strong password}
      - GF_USERS_ALLOW_SIGN_UP=false
    restart: unless-stopped
    networks:
      - lichen

volumes:
  chain-data:
  prometheus-data:
  grafana-data:

networks:
  lichen:
    driver: bridge
