# ═══════════════════════════════════════════════════════════════════════════════
# Prometheus Alert Rules — Lichen DEX
# ═══════════════════════════════════════════════════════════════════════════════

groups:
  - name: lichendex_critical
    rules:
      - alert: NodeDown
        expr: up{job="lichen"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Lichen node is down"
          description: "The Lichen RPC node has been unreachable for >1 minute."

      - alert: SlotStale
        expr: time() - chain_last_slot_timestamp > 30
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Block production stalled"
          description: "No new slots produced in >30 seconds."

      - alert: InsuranceFundCritical
        expr: dex_insurance_fund_balance < 10000
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Insurance fund critically low"
          description: "DEX margin insurance fund is below 10,000 LICN."

  - name: lichendex_warning
    rules:
      - alert: HighRPCLatency
        expr: histogram_quantile(0.99, rate(rpc_request_duration_seconds_bucket[5m])) > 0.5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "RPC P99 latency >500ms"

      - alert: HighPendingTxCount
        expr: pending_transaction_count > 1000
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Transaction backlog growing"
          description: "Pending transactions: {{ $value }}"

      - alert: InsuranceFundLow
        expr: dex_insurance_fund_balance < 50000
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Insurance fund below 50K LICN"

      - alert: WebSocketConnectionsHigh
        expr: ws_active_connections > 5000
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High WebSocket connection count: {{ $value }}"

      - alert: OrderThroughputLow
        expr: rate(dex_orders_total[5m]) < 10
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Order throughput below 10/s"
