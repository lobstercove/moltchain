# ═══════════════════════════════════════════════════════════════════════════════
# Prometheus Configuration — Lichen DEX
# ═══════════════════════════════════════════════════════════════════════════════

global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - alerts.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

scrape_configs:
  # ─── Lichen Node Metrics ───
  - job_name: 'lichen'
    static_configs:
      - targets: ['lichen:9100']
    metrics_path: /metrics
    scrape_interval: 5s

  # ─── Prometheus self-monitoring ───
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # ─── Nginx (stub_status) ───
  # NOTE: Requires nginx stub_status module. Add to nginx config:
  #   server { listen 8080; location /stub_status { stub_status; allow 127.0.0.1; deny all; } }
  # Disabled by default — uncomment when nginx stub_status is configured.
  # - job_name: 'nginx'
  #   static_configs:
  #     - targets: ['nginx:8080']
  #   metrics_path: /stub_status
