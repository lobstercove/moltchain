# ═══════════════════════════════════════════════════════════════════════════════
# Prometheus Configuration — MoltyDEX
# ═══════════════════════════════════════════════════════════════════════════════

global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - alerts.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

scrape_configs:
  # ─── MoltChain Node Metrics ───
  - job_name: 'moltchain'
    static_configs:
      - targets: ['moltchain:9100']
    metrics_path: /metrics
    scrape_interval: 5s

  # ─── Prometheus self-monitoring ───
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # ─── Nginx (if stub_status enabled) ───
  - job_name: 'nginx'
    static_configs:
      - targets: ['nginx:8080']
    metrics_path: /stub_status
